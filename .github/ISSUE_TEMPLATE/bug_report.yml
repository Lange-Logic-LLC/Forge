name: Bug Report
description: Report a reproducible bug or unexpected behavior in Forge.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Detailed reports help us fix issues faster.

        **Before filing:** please search [existing issues](https://github.com/Lange-Logic-LLC/Forge/issues) to see if this has already been reported.

        **Security issues:** do not file them here — see [`SECURITY.md`](https://github.com/Lange-Logic-LLC/Forge/blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: "When I run `forge build --platform ios`, the CLI exits with ..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: The exact steps to reproduce the bug. Include commands, inputs, and any relevant configuration.
      placeholder: |
        1. Clone the repo
        2. Run `bash scripts/setup.sh`
        3. Run `forge build --platform ios`
        4. Observe error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces where relevant (redact anything sensitive first).
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Forge is affected?
      multiple: true
      options:
        - API (packages/api)
        - Worker — iOS (packages/worker)
        - Worker — Android (packages/worker)
        - CLI (packages/cli)
        - Dashboard (apps/dashboard)
        - Shared types / schemas (packages/shared)
        - Supabase migrations
        - Docker Android builder
        - Setup / Scripts
        - Documentation
        - Other / Unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Forge Version or Commit
      description: The version tag or commit SHA you're running.
      placeholder: "v0.1.0 or commit abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.4 (Apple Silicon)"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: "20.11.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. Redact credentials, tokens, and personal information before posting.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, links, or anything else that helps us understand the issue.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have redacted any secrets, tokens, or personal information from logs and screenshots.
          required: true
        - label: I understand that security issues should be reported privately via SECURITY.md.
          required: true
